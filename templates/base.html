<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Training Management-DevOps Version{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <!-- Top Navbar -->
  
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top py-0">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'dashboard:index' %}">Training Management - DevOps Version 2</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <!-- <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:index' %}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'dashboard:add_training' %}">Add Training</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'search:home' %}">Search</a></li>
	        <li class="nav-item"> <a class="nav-link {% if request.resolver_match.namespace == 'employee_list' %}active{% endif %}" href="{% url 'employee_list:home' %}"> Employee List </a> </li>
	      </ul> -->
        <ul class="navbar-nav ms-auto align-items-center">

          <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard:index' %}">
                  Home
              </a>
          </li>

          <li class="nav-item">
              <a class="nav-link" href="{% url 'dashboard:add_training' %}">
                  Add Training
              </a>
          </li>

          <li class="nav-item">
              <a class="nav-link" href="{% url 'search:home' %}">
                  Search
              </a>
          </li>

          <li class="nav-item">
              <a class="nav-link {% if request.resolver_match.namespace == 'employee_list' %}active{% endif %}"
                href="{% url 'employee_list:home' %}">
                  Employee List
              </a>
          </li>

          {% if user.is_authenticated %}
          <li class="nav-item ms-3">
              <span class="text-light me-2">
                  {{ user.username }}
              </span>
          </li>

          <li class="nav-item">
              <a href="{% url 'accounts:logout' %}"
                class="btn btn-danger btn-sm">
                  Logout
              </a>
          </li>
          {% endif %}

      </ul>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <div class="container my-4">
    {% block content %}{% endblock %}
  </div>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  {% block extra_js %}{% endblock %}
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
      lucide.createIcons();
  </script>
</body>
</html>
