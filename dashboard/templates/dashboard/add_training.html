{% extends 'base.html' %}

{% block title %}Add Training{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center">
    <button class="btn btn-success" id="openAddTrainingModal">Add New Training</button>
</div>

<!-- Modal for Adding New Training -->
<div id="addTrainingModal" class="modal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Training</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="addTrainingForm" method="post" action="{% url 'dashboard:add_training' %}">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100">Add Training</button>
                </form>
            </div>
        </div>
    </div>
</div>

<h3 class="my-4">Existing Trainings</h3>
<div id="trainings">
    {% include 'dashboard/_training_list.html' %}
</div>
{% endblock %}

{% block extra_js %}

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

<script>
document.getElementById("openAddTrainingModal").addEventListener("click", function() {
    let modal = new bootstrap.Modal(document.getElementById("addTrainingModal"));
    modal.show();
});

document.getElementById("addTrainingForm").addEventListener("submit", function(e) {
    e.preventDefault();
    let form = this;

    fetch(form.action, {
        method: "POST",
        body: new FormData(form),
        headers: {
            "X-Requested-With": "XMLHttpRequest"
        }
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            // Update the training list
            document.getElementById("trainings").innerHTML = data.html;

            // Close modal
            let modalEl = document.getElementById("addTrainingModal");
            let modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            // Reset form
            form.reset();

            // Show Toastify success message
            Toastify({
                text: "Training added successfully.",
                duration: 2000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: "green"
            }).showToast();
        } else {
            // Show error notification
            Toastify({
                text: "Please correct the errors before submitting.",
                duration: 2000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: "red"
            }).showToast();
        }
    })
    .catch(err => {
        console.error("Error:", err);
        Toastify({
            text: "An error occurred while adding training.",
            duration: 2000,
            close: true,
            gravity: "top",
            position: "right",
            backgroundColor: "red"
        }).showToast();
    });
});
</script>



{% endblock %}
