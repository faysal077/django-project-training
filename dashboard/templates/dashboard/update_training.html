{% extends "base.html" %}
{% block title %}Update Training{% endblock %}

{% block content %}
<h3 class="mb-4">Update Training</h3>

<form method="post" class="max-w-lg">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary">Update</button>
    <a href="{% url 'dashboard:training_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
