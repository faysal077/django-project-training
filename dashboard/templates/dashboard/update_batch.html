{% extends "base.html" %}

{% block content %}

<div class="max-w-3xl mx-auto mt-10">

    <!-- CARD -->
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">

        <!-- HEADER -->
        <div class="px-6 py-5 border-b border-slate-100">
            <h2 class="text-2xl font-bold text-slate-800">
                Update Batch
            </h2>

            <p class="text-sm text-slate-500 mt-1">
                Edit batch information below.
            </p>
        </div>

        <!-- FORM -->
        <div class="p-6">

            <form method="POST">
                {% csrf_token %}

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">

                    <!-- START DATE -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Start Date
                        </label>

                        {{ form.start_date }}
                    </div>

                    <!-- END DATE -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            End Date
                        </label>

                        {{ form.end_date }}
                    </div>

                    <!-- START TIME -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Start Time
                        </label>

                        {{ form.start_time }}
                    </div>

                    <!-- END TIME -->
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            End Time
                        </label>

                        {{ form.end_time }}
                    </div>

                    <!-- TOTAL HOURS -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-2">
                            Total Training Hours
                        </label>

                        {{ form.total_training_hours }}
                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="flex items-center justify-end gap-3 mt-8">

                    <a href="{% url 'dashboard:add_batch' training_id %}"
                       class="px-5 py-2.5 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-100 transition-all">

                        Cancel
                    </a>

                    <button type="submit"
                            class="px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-700 text-white font-semibold transition-all">

                        Update Batch
                    </button>

                </div>

            </form>

        </div>
    </div>
</div>

{% endblock %}
<script>
    lucide.createIcons();
</script>
