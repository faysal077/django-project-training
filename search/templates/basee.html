{% extends "base.html" %}

{% block content %}

<style>
.sidebar {
    height: calc(100vh - 55px);
    width: 250px;
    position: fixed;
    top: 55px;
    left: 0;
    background-color: #343a40;
    padding-top: 20px;
}

.sidebar a {
    padding: 12px 20px;
    display: block;
    color: white;
    text-decoration: none;
}

.sidebar a:hover {
    background-color: #495057;
}

.content {
    margin-left: 200px;
}
</style>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="sidebar">
        <a href="{% url 'search:home' %}">🏠 Home</a>
        <a href="{% url 'search:search_by_name' %}">🔍 Search by Name</a>
        <a href="{% url 'search:search_by_training' %}">📚 Search by Training</a>
        <a href="{% url 'search:search_not_taken' %}">🚫 Unattended Trainings</a>
        <a href="{% url 'search:search_by_multiple_trainings' %}">🔍 Multiple Trainings</a>
        <a href="{% url 'search:search_by_timeline' %}">📅 Timeline</a>
    </div>

    <!-- Page Content -->
    <div class="content flex-grow-1 p-4">
        {% block search_content %}{% endblock %}
    </div>

</div>

{% endblock %}
